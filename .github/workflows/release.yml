name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Clean previous builds
        shell: bash
        run: |
          rm -rf dist release
          mkdir -p release

      - name: Build and package
        id: build
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            pnpm exec electron-vite build && pnpm exec electron-builder --linux --publish never
          else
            pnpm exec electron-vite build && pnpm exec electron-builder --win --publish never
          fi

      - name: List release directory
        if: always()
        shell: bash
        run: |
          echo "=== Release directory contents ==="
          if [ -d "release" ]; then
            ls -la release/
            echo "=== File count ==="
            find release -type f | wc -l
          else
            echo "ERROR: release/ does not exist"
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          # Hash user-facing artifacts only (skip auto-update metadata and blockmaps).
          shopt -s nullglob
          files=(*.exe *.AppImage *.deb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no artifact files found to hash"
            exit 1
          fi
          sha256sum "${files[@]}" > "SHA256SUMS-${{ matrix.platform }}.txt"
          echo "=== SHA256SUMS-${{ matrix.platform }}.txt ==="
          cat "SHA256SUMS-${{ matrix.platform }}.txt"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/*.exe
            release/*.AppImage
            release/*.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: release/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Combine per-platform checksums into SHA256SUMS
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          parts=(SHA256SUMS-*.txt)
          if [ ${#parts[@]} -eq 0 ]; then
            echo "ERROR: no per-platform SHA256SUMS files found"
            exit 1
          fi
          cat "${parts[@]}" > SHA256SUMS
          rm "${parts[@]}"
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: artifacts/*
