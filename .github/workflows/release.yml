name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout grimoire
        uses: actions/checkout@v6
        with:
          path: grimoire

      # pnpm-workspace.yaml resolves @grimoire/social-types from
      # ../grimoire-social/packages/*. Without this sibling checkout the
      # workspace dep fails to resolve and pnpm install bails out.
      - name: Checkout grimoire-social (sibling for shared types)
        uses: actions/checkout@v6
        with:
          repository: Slush97/grimoire-social
          path: grimoire-social
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: grimoire/pnpm-lock.yaml

      # @grimoire/social-types declares zod as a peer dependency; the symlinked
      # workspace package needs its own node_modules so the import resolves
      # from the Electron build.
      - name: Install grimoire-social deps (for the shared workspace package)
        working-directory: grimoire-social
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        working-directory: grimoire
        run: pnpm install --frozen-lockfile

      - name: Clean previous builds
        working-directory: grimoire
        shell: bash
        run: |
          rm -rf dist release
          mkdir -p release

      - name: Build and package
        id: build
        working-directory: grimoire
        shell: bash
        env:
          # Baked into the renderer by electron.vite.config.ts. Production
          # builds refuse to start without this set to an https:// URL so
          # installers can't ship pointing at localhost:8787.
          GRIMOIRE_SOCIAL_BASE_URL: https://grimoire-social.slusheliott.workers.dev
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            pnpm exec electron-vite build && pnpm exec electron-builder --linux --publish never
          else
            pnpm exec electron-vite build && pnpm exec electron-builder --win --publish never
          fi

      - name: List release directory
        if: always()
        working-directory: grimoire
        shell: bash
        run: |
          echo "=== Release directory contents ==="
          if [ -d "release" ]; then
            ls -la release/
            echo "=== File count ==="
            find release -type f | wc -l
          else
            echo "ERROR: release/ does not exist"
            exit 1
          fi

      - name: Generate SHA256 checksums
        working-directory: grimoire
        shell: bash
        run: |
          cd release
          # Hash user-facing artifacts only (skip auto-update metadata and blockmaps).
          shopt -s nullglob
          files=(*.exe *.AppImage *.deb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no artifact files found to hash"
            exit 1
          fi
          sha256sum "${files[@]}" > "SHA256SUMS-${{ matrix.platform }}.txt"
          echo "=== SHA256SUMS-${{ matrix.platform }}.txt ==="
          cat "SHA256SUMS-${{ matrix.platform }}.txt"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            grimoire/release/*.exe
            grimoire/release/*.AppImage
            grimoire/release/*.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-build
          path: grimoire/release/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Combine per-platform checksums into SHA256SUMS
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          parts=(SHA256SUMS-*.txt)
          if [ ${#parts[@]} -eq 0 ]; then
            echo "ERROR: no per-platform SHA256SUMS files found"
            exit 1
          fi
          cat "${parts[@]}" > SHA256SUMS
          rm "${parts[@]}"
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: artifacts/*

  aur-publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && inputs.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-build
          path: artifacts

      - name: Compute version and .deb sha256
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB="artifacts/grimoire_${VERSION}_amd64.deb"
          if [ ! -f "$DEB" ]; then
            echo "ERROR: $DEB not found in artifacts"
            ls -la artifacts/
            exit 1
          fi
          SHA="$(sha256sum "$DEB" | awk '{print $1}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION sha=$SHA"

      - name: Setup SSH for AUR
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/grimoire-bin.git aur-repo

      - name: Sync PKGBUILD from project and bump version/sha
        shell: bash
        run: |
          cp aur/grimoire-bin/PKGBUILD aur-repo/PKGBUILD
          cd aur-repo
          sed -i "s/^pkgver=.*/pkgver=${{ steps.meta.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${{ steps.meta.outputs.sha }}')|" PKGBUILD
          echo "=== Updated PKGBUILD ==="
          cat PKGBUILD

      - name: Regenerate .SRCINFO via archlinux container
        shell: bash
        run: |
          docker run --rm -v "$PWD/aur-repo:/pkg:ro" archlinux:latest bash -c '
            {
              useradd -m builder
              cp /pkg/PKGBUILD /tmp/PKGBUILD
              chown builder:builder /tmp/PKGBUILD
            } >&2
            su builder -c "cd /tmp && makepkg --printsrcinfo"
          ' > aur-repo/.SRCINFO
          echo "=== .SRCINFO ==="
          cat aur-repo/.SRCINFO

      - name: Commit and push to AUR
        shell: bash
        run: |
          cd aur-repo
          git config user.name "esocidae"
          git config user.email "slusheliott@gmail.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to push; AUR already matches."
            exit 0
          fi
          git commit -m "Update to ${{ steps.meta.outputs.version }}"
          git push origin master

  apt-publish:
    needs: release
    runs-on: ubuntu-latest
    # Dormant until the R2 bucket + secrets exist and you set the repo variable
    # APT_PUBLISH_ENABLED to "true". Until then this is skipped, so releases
    # stay green while the apt repo isn't wired up. See docs/apt-repo.md.
    if: startsWith(github.ref, 'refs/tags/') && inputs.draft != true && vars.APT_PUBLISH_ENABLED == 'true'

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      BUCKET: grimoire-apt

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-build
          path: artifacts

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      # Import the dedicated (passphraseless) repo signing key into a throwaway
      # GNUPGHOME and stash its fingerprint for reprepro's SignWith.
      - name: Import signing key
        shell: bash
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"; export GNUPGHOME
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          FPR="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')"
          echo "APT_GPG_FPR=$FPR" >> "$GITHUB_ENV"

      # Rebuild a fresh, signed, latest-only repo from this release's .deb.
      # reprepro keeps a single version per package, so the repo always offers
      # exactly the current release; older versions remain on GitHub Releases.
      - name: Build signed repo
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DEB="artifacts/grimoire_${VERSION}_amd64.deb"
          if [ ! -f "$DEB" ]; then
            echo "ERROR: $DEB not found in artifacts"; ls -la artifacts; exit 1
          fi
          mkdir -p repo/conf
          cat > repo/conf/distributions <<EOF
          Origin: Grimoire
          Label: Grimoire
          Codename: stable
          Suite: stable
          Architectures: amd64
          Components: main
          Description: Grimoire (Deadlock mod manager) APT repository
          SignWith: ${APT_GPG_FPR}
          EOF
          reprepro -b repo includedeb stable "$DEB"
          gpg --export "$APT_GPG_FPR" > repo/grimoire.gpg

      # Pool .debs are version-stamped and immutable, so cache them hard. The
      # dists/ index reuses stable paths every release, so it must be no-cache
      # or apt update sees a stale package list behind Cloudflare's CDN. Upload
      # the pool before the index so the index never points at a missing .deb.
      - name: Publish to R2
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync repo/pool/ "s3://${BUCKET}/pool/" --delete \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync repo/dists/ "s3://${BUCKET}/dists/" --delete \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache"
          aws s3 cp repo/grimoire.gpg "s3://${BUCKET}/grimoire.gpg" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache"
